version: '3.7'

services:
  mysql:
    image: mysql:8.0.17
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: 'marketplaces-db'
      MYSQL_USER: 'marketplaces'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-password}'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-password}'
    ports:
      - '3306:3306'
    volumes:
      - database_volume:/var/lib/marketplaces/db-test

volumes:
  database_volume:
